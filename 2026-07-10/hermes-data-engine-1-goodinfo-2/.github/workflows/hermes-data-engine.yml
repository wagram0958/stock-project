name: Hermes Data Engine

on:
  schedule:
    # 16:30 Asia/Taipei, Monday-Friday.
    - cron: '30 8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hermes-data-engine
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package
        run: python -m pip install -e . "pytest>=8,<9"

      - name: Run tests
        run: python -m pytest -q

      - name: Generate Hermes JSON
        env:
          TZ: Asia/Taipei
        run: hermes-data-engine run --output-dir data --symbols 3033,6214,6753,1314,2002

      - name: Validate generated JSON
        run: hermes-data-engine validate data/3033.json data/6214.json data/6753.json data/1314.json data/2002.json

      - name: Commit and push changed output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/3033.json data/6214.json data/6753.json data/1314.json data/2002.json
          if git diff --cached --quiet; then
            echo "No Hermes data changes."
            exit 0
          fi
          git commit -m "chore: update Hermes data"
          git push
